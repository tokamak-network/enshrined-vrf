version: 2.1

# Kona CI Continuation Configuration
# This file contains ONLY Kona-specific jobs and workflows.
# It is merged with main.yml when kona/** changes are detected.
# Shared orbs, commands, and jobs come from main.yml during merge.

# Orbs used by Kona jobs (also in main.yml, merged during continuation)
orbs:
  go: circleci/go@1.8.0
  gcp-cli: circleci/gcp-cli@3.0.1
  slack: circleci/slack@6.0.0
  codecov: codecov/codecov@5.0.3
  utils: ethereum-optimism/circleci-utils@1.0.23

parameters:
  # Required parameters (also in main.yml, merged during continuation)
  default_docker_image:
    type: string
    default: cimg/base:2024.01
  base_image:
    type: string
    default: default
  kona_dispatch:
    type: boolean
    default: false
  go-cache-version:
    type: string
    default: "v0.0"

# Commands used by Kona jobs (also defined in main.yml, merged during continuation)
commands:
  install-zstd:
    description: "Install zstd compression utility"
    steps:
      - run:
          name: Install zstd
          command: sudo apt-get update && sudo apt-get install -y zstd=1.4.8*

  install-cargo-binstall:
    description: "Install cargo-binstall for fast binary installations"
    steps:
      - run:
          name: Install cargo-binstall
          command: |
            if command -v cargo-binstall >/dev/null 2>&1; then
              echo "cargo-binstall already installed"
              exit 0
            fi
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

  go-restore-cache:
    parameters:
      module:
        type: string
        default: .
      namespace:
        type: string
      version:
        type: string
        default: <<pipeline.parameters.go-cache-version>>
    steps:
      - restore_cache:
          name: Restore go cache for <<parameters.namespace>> (<<parameters.module>>/go.mod)
          keys:
            - go-<<parameters.namespace>>-<<parameters.version>>-<<parameters.module>>-{{ checksum "<<parameters.module>>/go.mod" }}-{{ checksum "<<parameters.module>>/go.sum" }}
            - go-<<parameters.namespace>>-<<parameters.version>>-<<parameters.module>>-{{ checksum "<<parameters.module>>/go.mod" }}-
            - go-<<parameters.namespace>>-<<parameters.version>>-<<parameters.module>>-

  go-save-cache:
    parameters:
      module:
        type: string
        default: .
      namespace:
        type: string
      version:
        type: string
        default: <<pipeline.parameters.go-cache-version>>
    steps:
      - save_cache:
          name: Save go cache for <<parameters.namespace>> (<<parameters.module>>/go.mod)
          paths:
            - ~/.cache/go-build
            - ~/go/pkg/mod
          key: go-<<parameters.namespace>>-<<parameters.version>>-<<parameters.module>>-{{ checksum "<<parameters.module>>/go.mod" }}-{{ checksum "<<parameters.module>>/go.sum" }}

  rust-install-toolchain:
    description: "Install Rust toolchain via rustup"
    parameters:
      channel:
        description: The Rust channel release to use (stable, nightly, etc.)
        type: string
        default: "stable"
      components:
        description: Components to install (space or comma separated)
        type: string
        default: ""
      toolchain_version:
        description: The specific toolchain version for stable channel
        type: string
        default: "1.92.0"
      target:
        description: A custom target architecture to add to the toolchain
        type: string
        default: ""
    steps:
      - run:
          name: Install Rust toolchain (<< parameters.channel >>)
          command: |
            rustup default << parameters.toolchain_version >>

            if [ -n "<< parameters.components >>" ]; then
              rustup component add << parameters.components >>
            fi
            if [ -n "<< parameters.target >>" ]; then
              rustup target add << parameters.target >>
            fi

  rust-setup-env:
    description: "Fix rust mise environment variables"
    steps:
      - run:
          name: Fix mise environment variables
          command: |
            echo "export CARGO_HOME=${MISE_CARGO_HOME}" >> "$BASH_ENV"
            echo "export RUSTUP_HOME=${MISE_RUSTUP_HOME}" >> "$BASH_ENV"
            echo "source ${MISE_CARGO_HOME}/env" >> "$BASH_ENV"
      - run:
          name: Configure Rust binary paths (sysgo)
          command: |
            ROOT_DIR="$(pwd)"
            BIN_DIR="$ROOT_DIR/.circleci-cache/rust-binaries"
            echo "export RUST_BINARY_PATH_KONA_NODE=$ROOT_DIR/kona/target/release/kona-node" >> "$BASH_ENV"
            echo "export RUST_BINARY_PATH_KONA_SUPERVISOR=$ROOT_DIR/kona/target/release/kona-supervisor" >> "$BASH_ENV"
            echo "export RUST_BINARY_PATH_OP_RBUILDER=$BIN_DIR/op-rbuilder" >> "$BASH_ENV"
            echo "export RUST_BINARY_PATH_ROLLUP_BOOST=$BIN_DIR/rollup-boost" >> "$BASH_ENV"

  rust-prepare:
    parameters:
      needs_clang:
        description: "Whether to install clang (needed by bindgen for reth-mdbx-sys)."
        type: boolean
        default: true
    description: "Prepare the Rust environment for the build."
    steps:
      - rust-setup-env
      - when:
          condition: << parameters.needs_clang >>
          steps:
            - run:
                name: Install clang
                command: |
                  export NEEDRESTART_MODE=a
                  sudo -E apt-get update --yes
                  sudo -E apt-get install -y --no-install-recommends clang llvm-dev libclang-dev

  rust-restore-build-cache:
    description: "Restore the target directory cache for a Rust workspace"
    parameters:
      directory:
        description: "Directory containing the Cargo workspace"
        type: string
      version:
        description: "Version of the cache"
        type: string
        default: "15"
      profile:
        description: "Profile to restore the cache for"
        type: string
        default: "debug"
      features:
        description: "Comma-separated list of features to restore the cache for"
        type: string
        default: ""
      prefix:
        description: "Prefix to add to the cache key"
        type: string
        default: "rust-build"
    steps:
      - restore_cache:
          name: Restore << parameters.directory >> target cache
          keys:
            - << parameters.prefix >>-v<< parameters.version >>-{{ checksum "<< parameters.directory >>/Cargo.lock" }}-<< parameters.profile >>-<< parameters.features >>
            - << parameters.prefix >>-v<< parameters.version >>-{{ checksum "<< parameters.directory >>/Cargo.lock" }}-<< parameters.profile >>
            - << parameters.prefix >>-v<< parameters.version >>-{{ checksum "<< parameters.directory >>/Cargo.lock" }}
      - restore_cache:
          name: Restore << parameters.directory >> registry cache (mise)
          keys:
            - << parameters.prefix >>-registry-v<< parameters.version >>-{{ checksum "<< parameters.directory >>/Cargo.lock" }}

  rust-save-build-cache:
    description: "Save the target directory cache for a Rust workspace"
    parameters:
      directory:
        description: "Directory containing the Cargo workspace"
        type: string
      version:
        description: "Version of the cache"
        type: string
        default: "15"
      profile:
        description: "Profile to save the cache for"
        type: string
        default: "debug"
      features:
        description: "Comma-separated list of features to save the cache for"
        type: string
        default: ""
      prefix:
        description: "Prefix to add to the cache key"
        type: string
        default: "rust-build"
    steps:
      - save_cache:
          key: << parameters.prefix >>-registry-v<< parameters.version >>-{{ checksum "<< parameters.directory >>/Cargo.lock" }}
          name: Save << parameters.directory >> registry cache (mise)
          paths:
            - /data/mise-data/.cargo/registry
            - /data/mise-data/.cargo/git
            - /data/mise-data/.cargo/bin
            - /data/mise-data/.rustup
      - save_cache:
          key: << parameters.prefix >>-v<< parameters.version >>-{{ checksum "<< parameters.directory >>/Cargo.lock" }}-<< parameters.profile >>-<< parameters.features >>
          name: Save << parameters.directory >> target cache
          paths:
            - << parameters.directory >>/target/<< parameters.profile >>

  rust-prepare-and-restore-cache:
    description: "Prepare the Rust environment and restore the cache"
    parameters:
      needs_clang:
        description: "Whether to install clang (needed by bindgen for reth-mdbx-sys)"
        type: boolean
        default: true
      directory:
        description: "Directory containing the Cargo workspace"
        type: string
      version:
        description: "Version of the cache"
        type: string
        default: "15"
      profile:
        description: "Profile to restore the cache for"
        type: string
        default: "debug"
      features:
        description: "Comma-separated list of features to restore the cache for"
        type: string
        default: "default"
      prefix:
        description: "Prefix to add to the cache key"
        type: string
        default: "rust-build"
    steps:
      - rust-prepare:
          needs_clang: << parameters.needs_clang >>
      - rust-restore-build-cache:
          version: << parameters.version >>
          directory: << parameters.directory >>
          profile: << parameters.profile >>
          features: << parameters.features >>
          prefix: << parameters.prefix >>

  rust-build:
    description: "Build a Rust workspace with target directory caching"
    parameters:
      directory:
        description: "Directory containing the Cargo workspace"
        type: string
      needs_clang:
        description: "Whether to install clang (needed by bindgen for reth-mdbx-sys)"
        type: boolean
        default: true
      version:
        description: "Version of the cache"
        type: string
        default: "15"
      profile:
        description: "Profile to build the binary with"
        type: string
        default: "debug"
      features:
        description: "Comma-separated list of features to build the binary with"
        type: string
        default: "default"
      package:
        description: "Package name to build. If not specified, the workspace will be built."
        type: string
        default: ""
      binary:
        description: "Binary name to build. If not specified, all targets will be built."
        type: string
        default: ""
      save_cache:
        description: "Whether to save the cache at the end of the build"
        type: boolean
        default: false
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache:
          needs_clang: << parameters.needs_clang >>
          version: << parameters.version >>
          directory: << parameters.directory >>
          profile: << parameters.profile >>
          features: << parameters.features >>
      - run:
          name: Build << parameters.directory >>
          command: |
            PWD=$(pwd)
            export CARGO_TARGET_DIR="$PWD/<< parameters.directory >>/target"
            echo "CARGO_TARGET_DIR: $CARGO_TARGET_DIR"
            export PROFILE="--profile << parameters.profile >>"

            if [ "<< parameters.profile >>" = "debug" ]; then
              export PROFILE="--profile dev"
            fi

            export PACKAGE="--workspace"
            if [ -n "<< parameters.package >>" ]; then
              export PACKAGE="--package << parameters.package >>"
            fi

            export BINARY="--all-targets"
            if [ -n "<< parameters.binary >>" ]; then
              export BINARY="--bin << parameters.binary >>"
            fi

            export FEATURES="--features << parameters.features >>"
            if [ "<< parameters.features >>" = "all" ]; then
              export FEATURES="--all-features"
            fi

            cd << parameters.directory >> && cargo build $PROFILE $TARGET $PACKAGE $FEATURES
          no_output_timeout: 30m
      - when:
          condition: << parameters.save_cache >>
          steps:
            - rust-save-build-cache:
                directory: << parameters.directory >>
                version: << parameters.version >>
                profile: << parameters.profile >>
                features: << parameters.features >>

  gcp-oidc-authenticate:
    description: "Authenticate with GCP using a CircleCI OIDC token."
    parameters:
      project_id:
        type: env_var_name
        default: GCP_PROJECT_ID
      workload_identity_pool_id:
        type: env_var_name
        default: GCP_WIP_ID
      workload_identity_pool_provider_id:
        type: env_var_name
        default: GCP_WIP_PROVIDER_ID
      service_account_email:
        type: env_var_name
        default: GCP_SERVICE_ACCOUNT_EMAIL
      gcp_cred_config_file_path:
        type: string
        default: /home/circleci/gcp_cred_config.json
      oidc_token_file_path:
        type: string
        default: /home/circleci/oidc_token.json
    steps:
      - run:
          name: "Create OIDC credential configuration"
          command: |
            echo $CIRCLE_OIDC_TOKEN > << parameters.oidc_token_file_path >>
            gcloud iam workload-identity-pools create-cred-config \
                "projects/${<< parameters.project_id >>}/locations/global/workloadIdentityPools/${<< parameters.workload_identity_pool_id >>}/providers/${<< parameters.workload_identity_pool_provider_id >>}"\
                --output-file="<< parameters.gcp_cred_config_file_path >>" \
                --service-account="${<< parameters.service_account_email >>}" \
                --credential-source-file=<< parameters.oidc_token_file_path >>
      - run:
          name: "Authenticate with GCP using OIDC"
          command: |
            gcloud auth login --brief --cred-file "<< parameters.gcp_cred_config_file_path >>"
            echo "export GOOGLE_APPLICATION_CREDENTIALS='<< parameters.gcp_cred_config_file_path >>'" | tee -a "$BASH_ENV"

# ============================================================================
# KONA JOBS
# ============================================================================
jobs:
  # Kona Node E2E Sysgo Tests (from node_e2e_sysgo_tests.yaml)
  kona-node-e2e-sysgo-tests:
    parameters:
      devnet_config:
        description: The devnet configuration to test
        type: string
      reorg_tests:
        description: Whether to run reorg tests
        type: boolean
        default: false
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - attach_workspace:
          at: .
      - go-restore-cache:
          namespace: kona-ci
      - rust-build: &kona-rust-build-release
          directory: kona
          profile: release
          binary: "kona-node"
      - run:
          name: Run common tests for node with sysgo orchestrator
          no_output_timeout: 60m
          command: |
            WD=$(pwd)
            echo "Running tests..."
            export OP_RETH_EXEC_PATH="$WD/.circleci-cache/rust-binaries/op-reth"
            export RUST_BINARY_PATH_KONA_NODE="$WD/kona/target/release/kona-node"
            cd kona && just test-e2e-sysgo-run node node/common "<<parameters.devnet_config>>"
      - when:
          condition:
            equal: [true, <<parameters.reorg_tests>>]
          steps:
            - run:
                name: Run reorg tests for node with sysgo orchestrator
                no_output_timeout: 60m
                command: |
                  WD=$(pwd)
                  echo "Running tests..."
                  export OP_RETH_EXEC_PATH="$WD/.circleci-cache/rust-binaries/op-reth"
                  export RUST_BINARY_PATH_KONA_NODE="$WD/kona/target/release/kona-node"
                  cd kona && just test-e2e-sysgo-run node node/reorgs "<<parameters.devnet_config>>"
      - go-save-cache:
          namespace: kona-ci

  # Kona Node Restart Tests (from node_e2e_sysgo_tests.yaml)
  kona-node-restart-sysgo-tests:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - attach_workspace:
          at: .
      - go-restore-cache:
          namespace: kona-ci
      - rust-build: *kona-rust-build-release
      - run:
          name: Run restart tests for node with sysgo orchestrator
          no_output_timeout: 60m
          command: |
            echo "Running tests..."
            WD=$(pwd)
            export RUST_BINARY_PATH_KONA_NODE="$WD/kona/target/release/kona-node"
            cd kona && just test-e2e-sysgo node node/restart
      - go-save-cache:
          namespace: kona-ci

  # Kona Proof Action Tests (from proof.yaml)
  kona-proof-action-tests:
    parameters:
      kind:
        description: The kind of action test (single or interop)
        type: string
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    parallelism: 4
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - attach_workspace:
          at: .
      - go-restore-cache:
          namespace: kona-ci
      - rust-build:
          <<: *kona-rust-build-release
          binary: "kona-host"
      - run:
          name: Build kona and run action tests
          working_directory: kona
          no_output_timeout: 90m
          command: |
            echo "Running action tests"
            export KONA_HOST_PATH=$(pwd)/target/release/kona-host
            just action-tests-<<parameters.kind>>-run
      - go-save-cache:
          namespace: kona-ci

  # Kona Host Client Offline Runs (from proof.yaml)
  kona-host-client-offline:
    parameters:
      target:
        description: The target platform (native, asterisc, cannon)
        type: string
    machine:
      image: <<pipeline.parameters.base_image>>
      docker_layer_caching: true
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - install-zstd
      - rust-prepare
      - install-cargo-binstall
      - run:
          name: Install cargo-llvm-cov
          command: |
            command -v cargo-llvm-cov >/dev/null || cargo binstall --no-confirm cargo-llvm-cov
      - when:
          condition:
            equal: [asterisc, <<parameters.target>>]
          steps:
            - run:
                name: Clone and build asterisc
                command: |
                  git clone --no-checkout --depth 1 https://github.com/ethereum-optimism/asterisc.git
                  cd asterisc && git fetch --depth 1 origin v1.3.0 && git checkout v1.3.0
                  make build-rvgo
                  sudo mv ./rvgo/bin/asterisc /usr/local/bin/
      - when:
          condition:
            equal: [cannon, <<parameters.target>>]
          steps:
            - run:
                name: Build cannon
                command: |
                  cd cannon && make
                  sudo mv ./bin/cannon /usr/local/bin/
      - run:
          name: Set run environment
          command: |
            echo 'export BLOCK_NUMBER=26215604' >> $BASH_ENV
            echo 'export L2_CLAIM=0x7415d942f80a34f77d344e4bccb7050f14e593f5ea33669d27ea01dce273d72d' >> $BASH_ENV
            echo 'export L2_OUTPUT_ROOT=0xaa34b62993bd888d7a2ad8541935374e39948576fce12aa8179a0aa5b5bc787b' >> $BASH_ENV
            echo 'export L2_HEAD=0xf4adf5790bad1ffc9eee315dc163df9102473c5726a2743da27a8a10dc16b473' >> $BASH_ENV
            echo 'export L1_HEAD=0x010cfdb22eaa13e8cdfbf66403f8de2a026475e96a6635d53c31f853a0e3ae25' >> $BASH_ENV
            echo 'export L2_CHAIN_ID=11155420' >> $BASH_ENV
            echo 'export WITNESS_TAR_NAME=holocene-op-sepolia-26215604-witness.tar.zst' >> $BASH_ENV
      - run:
          name: Decompress witness data
          working_directory: kona
          command: |
            tar --zstd -xvf ./bin/client/testdata/$WITNESS_TAR_NAME -C .
      - run:
          name: Run host + client offline
          working_directory: kona/bin/client
          no_output_timeout: 40m
          command: |
            source <(cargo llvm-cov show-env --export-prefix)
            mkdir -p ../../target
            just run-client-<<parameters.target>>-offline \
              $BLOCK_NUMBER \
              $L2_CLAIM \
              $L2_OUTPUT_ROOT \
              $L2_HEAD \
              $L1_HEAD \
              $L2_CHAIN_ID
            cargo llvm-cov report --lcov --output-path client_host_cov.lcov

  # Kona Rust CI - Tests (from rust_ci.yaml)
  kona-cargo-tests:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &kona-tests-cache
          directory: kona
          prefix: kona-tests
          profile: "release"
      - install-cargo-binstall
      - run:
          name: Install nextest
          command: |
            command -v cargo-nextest >/dev/null || cargo binstall --no-confirm cargo-nextest
      - run:
          name: Run cargo tests
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just test
      - rust-save-build-cache: *kona-tests-cache

  # Kona Rust CI - Lint (from rust_ci.yaml)
  kona-cargo-lint:
    parameters:
      target:
        description: The lint target (native, cannon, asterisc)
        type: string
    machine:
      image: <<pipeline.parameters.base_image>>
      docker_layer_caching: true
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache:
          directory: kona
          features: "all"
      - rust-install-toolchain:
          components: rustfmt
      - run:
          name: Run fmt + lint for <<parameters.target>>
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just lint-<<parameters.target>>

  kona-build-fpvm:
    parameters:
      target:
        description: The build target (cannon-client, asterisc-client)
        type: string
    machine:
      image: <<pipeline.parameters.base_image>>
      docker_layer_caching: true
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare
      - run:
          name: Build <<parameters.target>>
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just build-<<parameters.target>>

  # Kona Rust CI - Build Benchmarks (from rust_ci.yaml)
  kona-cargo-build-benches:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &kona-benches-cache
          directory: kona
          prefix: kona-benches
      - run:
          name: Build benchmarks
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just benches
      - rust-save-build-cache: *kona-benches-cache

  # Kona Rust CI - Check unused dependencies (from rust_ci.yaml)
  kona-cargo-udeps:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &kona-udeps-cache
          directory: kona
          prefix: kona-udeps
          profile: "release"
      - install-cargo-binstall
      - run:
          name: Install cargo-udeps
          command: |
            command -v cargo-udeps >/dev/null || cargo binstall --no-confirm cargo-udeps
      - run:
          name: Check unused dependencies
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just check-udeps
      - rust-save-build-cache: *kona-udeps-cache

  # Kona Rust CI - Doc lint (from rust_ci.yaml)
  kona-cargo-doc-lint:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache:
          directory: kona
      - run:
          name: Lint documentation
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just lint-docs

  # Kona Rust CI - Doc tests (from rust_ci.yaml)
  kona-cargo-doc-test:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &kona-doc-test-cache
          directory: kona
          prefix: kona-doc-test
      - run:
          name: Run doc tests
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just test-docs
      - rust-save-build-cache: *kona-doc-test-cache

  # Kona Rust CI - Typos (from rust_ci.yaml)
  kona-typos:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: medium
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare
      - install-cargo-binstall
      - run:
          name: Install typos-cli
          command: |
            command -v typos >/dev/null || cargo binstall --no-confirm typos-cli
      - run:
          name: Check for typos
          working_directory: kona
          command: |
            typos

  # Kona Rust CI - Cargo hack (from rust_ci.yaml)
  kona-cargo-hack:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    parallelism: 4
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache:
          directory: kona
          features: "all"
      - install-cargo-binstall
      - run:
          name: Install cargo-hack
          command: |
            command -v cargo-hack >/dev/null || cargo binstall --no-confirm cargo-hack
      - run:
          name: Shard and run cargo hack
          working_directory: kona
          no_output_timeout: 40m
          command: |
            set -euo pipefail

            # 1) Produce the full list of concrete cargo commands (one per line)
            cargo hack check \
              --feature-powerset --no-dev-deps \
              --workspace --locked \
              --print-command-list > /tmp/hack_cmds.txt

            # 2) Take only this node's slice
            awk "NR % ${CIRCLE_NODE_TOTAL} == ${CIRCLE_NODE_INDEX}" /tmp/hack_cmds.txt \
              > /tmp/hack_cmds_shard.txt

            echo "Node ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL} running $(wc -l < /tmp/hack_cmds_shard.txt) cases"

            # 3) Execute
            while IFS= read -r cmd; do
              echo ">>> $cmd"
              bash -lc "$cmd"
            done < /tmp/hack_cmds_shard.txt

  # Kona Rust CI - Check no_std (from rust_ci.yaml)
  kona-check-no-std:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare
      - rust-install-toolchain:
          toolchain_version: 1.88.0
          target: riscv32imac-unknown-none-elf
      - run:
          name: Check no_std compatibility
          working_directory: kona
          no_output_timeout: 30m
          command: |
            just check-no-std

  # Kona Rust CI - Coverage (from rust_ci.yaml)
  kona-coverage:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &kona-coverage-cache
          directory: kona
          prefix: kona-coverage
          version: "1"
      - rust-install-toolchain:
          components: llvm-tools-preview
      - install-cargo-binstall
      - run:
          name: Install cargo-llvm-cov and nextest
          command: |
            command -v cargo-llvm-cov >/dev/null || cargo binstall --no-confirm cargo-llvm-cov
            command -v cargo-nextest >/dev/null || cargo binstall --no-confirm cargo-nextest
      - run:
          name: Generate lockfile if needed
          working_directory: kona
          command: |
            [ -f Cargo.lock ] || cargo generate-lockfile
      - run:
          name: Run coverage
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just llvm-cov-tests && mv ./target/nextest/ci/junit.xml ./junit.xml
      - codecov/upload:
          disable_search: true
          files: kona/lcov.info
          flags: unit
      - store_test_results:
          path: kona/junit.xml
      - rust-save-build-cache: *kona-coverage-cache

  # Kona Rust CI - Deny (from rust_ci.yaml)
  kona-cargo-deny:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: medium
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &kona-deny-cache
          directory: kona
          prefix: kona-deny
          version: "1"
      - install-cargo-binstall
      - run:
          name: Install cargo-deny
          command: |
            command -v cargo-deny >/dev/null || cargo binstall --no-confirm cargo-deny
      - run:
          name: Run cargo deny
          working_directory: kona
          command: |
            cargo deny check
      - rust-save-build-cache: *kona-deny-cache

  # Kona Rust CI - Zepter (from rust_ci.yaml)
  kona-zepter:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: medium
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare
      - install-cargo-binstall
      - run:
          name: Install zepter
          command: |
            command -v zepter >/dev/null || cargo binstall --no-confirm zepter
            zepter --version
      - run:
          name: Format and lint features
          working_directory: kona
          command: |
            zepter format features
            zepter

  # Kona Docs Build (from docs.yaml)
  kona-docs-build:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare
      - run:
          name: Install Node.js and Bun
          command: |
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y nodejs
            curl -fsSL https://bun.sh/install | bash
            echo 'export BUN_INSTALL="$HOME/.bun"' >> $BASH_ENV
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Install dependencies and Playwright browsers
          working_directory: kona/docs
          command: |
            bun i
            npx playwright install --with-deps chromium
      - run:
          name: Build Vocs documentation
          working_directory: kona/docs
          no_output_timeout: 60m
          command: |
            bun run build
            echo "Vocs Build Complete"
      - store_artifacts:
          path: kona/docs/docs/dist
          destination: kona-docs

  # Kona Link Checker (from lychee.yaml)
  kona-link-checker:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: medium
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - run:
          name: Install lychee
          command: |
            curl -sSfL https://github.com/lycheeverse/lychee/releases/download/v0.15.1/lychee-v0.15.1-x86_64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv lychee /usr/local/bin/
      - run:
          name: Check links
          working_directory: kona
          command: |
            lychee --config ./lychee.toml --cache-exclude-status 429 '**/README.md' './docs/**/*.md' './docs/**/*.mdx' './docs/**/*.html' './docs/**/*.json' || true

  # Kona Supervisor E2E Tests (from supervisor_e2e_sysgo.yaml)
  kona-supervisor-e2e-tests:
    parameters:
      test_pkg:
        description: The test package to run
        type: string
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-build:
          <<: *kona-rust-build-release
          binary: "kona-supervisor"
      - run:
          name: Run supervisor tests for <<parameters.test_pkg>>
          working_directory: kona
          no_output_timeout: 40m
          command: |
            just test-e2e-sysgo supervisor "/supervisor/<<parameters.test_pkg>>"

  # Kona Publish Prestate Artifacts (from publish_artifacts.yaml)
  kona-publish-prestate-artifacts:
    parameters:
      kind:
        description: The kind of prestate (cannon)
        type: string
        default: "cannon"
      version:
        description: The version to build (kona-client, kona-client-int)
        type: string
    machine:
      image: <<pipeline.parameters.base_image>>
      docker_layer_caching: true # we rely on this for faster builds, and actively warm it up for builds with common stages
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-install-toolchain:
          components: llvm-tools-preview
      - rust-prepare-and-restore-cache:
          directory: kona
          needs_clang: true
          profile: release
      - gcp-cli/install
      - gcp-oidc-authenticate:
          gcp_cred_config_file_path: /tmp/gcp_cred_config.json
          oidc_token_file_path: /tmp/oidc_token.json
      - run:
          name: Generate prestate artifacts
          working_directory: kona
          no_output_timeout: 60m
          command: |
            CANNON_TAG="$(cat .config/cannon_tag)"
            cd docker/fpvm-prestates
            just "<<parameters.kind>>" "<<parameters.version>>" "<< pipeline.git.branch >>" "$CANNON_TAG"
      - run:
          name: Upload prestates to GCS
          command: |
            PRESTATE_HASH=$(jq -r .pre ./prestate-artifacts-<<parameters.kind>>/prestate-proof.json)
            BRANCH_NAME=$(echo "<< pipeline.git.branch >>" | tr '/' '-')
            echo "Publishing ${PRESTATE_HASH} as ${BRANCH_NAME}"
            if [ -n "<< pipeline.git.branch >>" ]; then
              echo "Publishing commit hash data"
              INFO_FILE=$(mktemp)
              (echo "Commit=<< pipeline.git.revision >>" && echo "Prestate: ${PRESTATE_HASH}") > "${INFO_FILE}"
              gsutil cp "${INFO_FILE}" "gs://oplabs-network-data/proofs/kona/<<parameters.kind>>/${BRANCH_NAME}-<<parameters.version>>-prestate.bin.gz.txt"
              rm "${INFO_FILE}"
              PRESTATE_HASH="${BRANCH_NAME}-<<parameters.version>>"
            fi
            gsutil cp ./prestate-artifacts-<<parameters.kind>>/prestate.bin.gz "gs://oplabs-network-data/proofs/kona/<<parameters.kind>>/${PRESTATE_HASH}.bin.gz"
            echo "Successfully published prestates artifacts to GCS"

  # Kona Update Monorepo (for scheduled sync)
  kona-update-monorepo:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: medium
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - run:
          name: Check for kona upstream updates
          working_directory: kona
          command: |
            echo "Checking for kona upstream updates..."
            # This is a placeholder - implement actual sync logic as needed

# ============================================================================
# KONA WORKFLOWS
# ============================================================================
workflows:
  # Kona main CI workflow (runs on push to main, merge_group, pull_request)
  kona-ci:
    when:
      or:
        - equal: ["webhook", << pipeline.trigger_source >>]
        - and:
            - equal: [true, <<pipeline.parameters.kona_dispatch>>]
            - equal: ["api", << pipeline.trigger_source >>]
    jobs:
      # Dependencies from main config (contracts-bedrock-build, cannon-prestate-quick)
      # These jobs exist in main.yml and are available after merge
      - contracts-bedrock-build:
          build_args: --skip test
          context:
            - circleci-repo-readonly-authenticated-github-token
      - cannon-prestate-quick: &kona-job-base
          context:
            - circleci-repo-readonly-authenticated-github-token
      - cannon-kona-prestate:
          <<: *kona-job-base
      - rust-build-binary: &cannon-kona-host
          name: cannon-kona-host
          directory: kona
          profile: release
          binary: "kona-host"
          context:
            - circleci-repo-readonly-authenticated-github-token
      # Rust CI jobs (from rust_ci.yaml)
      - rust-build-binary: &kona-build-release
          name: kona-build-release
          directory: kona
          profile: release
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-build-binary:
          <<: *kona-job-base
          name: kona-build-debug
          directory: kona
          profile: "debug"
          features: "default"
          save_cache: true
      - rust-build-binary:
          <<: *kona-job-base
          name: kona-build-all-features
          directory: kona
          profile: "debug"
          features: "all"
          save_cache: true
      - kona-build-fpvm:
          <<: *kona-job-base
          name: kona-build-fpvm-<<matrix.target>>
          matrix:
            parameters:
              target: ["cannon-client", "asterisc-client"]
      - kona-cargo-tests:
          <<: *kona-job-base
      - kona-cargo-lint:
          <<: *kona-job-base
          name: kona-lint-<<matrix.target>>
          matrix:
            parameters:
              target: ["native", "cannon", "asterisc"]
      - kona-cargo-build-benches:
          <<: *kona-job-base
      - kona-cargo-udeps:
          <<: *kona-job-base
      - kona-cargo-doc-lint:
          <<: *kona-job-base
      - kona-cargo-doc-test:
          <<: *kona-job-base
      - kona-typos:
          <<: *kona-job-base
      - kona-cargo-deny:
          <<: *kona-job-base
      - kona-zepter:
          <<: *kona-job-base
      - kona-check-no-std:
          <<: *kona-job-base
      - kona-coverage:
          context:
            - circleci-repo-readonly-authenticated-github-token
          requires:
            - kona-cargo-tests
      - kona-cargo-hack:
          context:
            - circleci-repo-readonly-authenticated-github-token
          requires:
            - kona-build-release
            - kona-build-debug
            - kona-cargo-udeps
            - kona-build-all-features

      - rust-build-submodule:
          <<: *kona-job-base
          name: op-reth-build
          directory: reth
          binaries: op-reth
          build_command: cd crates/optimism/bin && cargo build --release --bin op-reth
          needs_clang: true

      # Node E2E tests (from node_e2e_sysgo_tests.yaml)
      - kona-node-e2e-sysgo-tests:
          name: kona-node-e2e-<<matrix.devnet_config>>
          matrix:
            parameters:
              devnet_config: ["simple-kona", "simple-kona-geth", "simple-kona-sequencer", "large-kona-sequencer"]
          context:
            - circleci-repo-readonly-authenticated-github-token
          requires:
            - contracts-bedrock-build
            - cannon-prestate-quick
            - cannon-kona-prestate
            - cannon-kona-host
            - kona-build-release
            - op-reth-build
      - kona-node-restart-sysgo-tests:
          name: kona-node-e2e-restart
          context:
            - circleci-repo-readonly-authenticated-github-token
          requires:
            - contracts-bedrock-build
            - cannon-prestate-quick
            - cannon-kona-prestate
            - cannon-kona-host
            - kona-build-release

      # Proof tests (from proof.yaml) - single kind only, interop excluded per original config
      - kona-proof-action-tests:
          name: kona-proof-action-single
          kind: single
          requires:
            - kona-build-release
            - contracts-bedrock-build
          context:
            - circleci-repo-readonly-authenticated-github-token
      - kona-host-client-offline:
          name: kona-host-client-native
          target: native
          requires:
            - kona-build-release
          context:
            - circleci-repo-readonly-authenticated-github-token
      - kona-host-client-offline:
          name: kona-host-client-asterisc
          target: asterisc
          requires:
            - kona-build-release
          context:
            - circleci-repo-readonly-authenticated-github-token
      - kona-host-client-offline:
          name: kona-host-client-cannon
          target: cannon
          requires:
            - kona-build-release
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Docs build (from docs.yaml)
      - kona-docs-build:
          context:
            - circleci-repo-readonly-authenticated-github-token

  # Kona scheduled workflows
  scheduled-kona-link-checker:
    when:
      equal: [build_weekly, <<pipeline.schedule.name>>]
    jobs:
      - kona-link-checker:
          context:
            - circleci-repo-readonly-authenticated-github-token

  scheduled-kona-sync:
    when:
      equal: [build_weekly, <<pipeline.schedule.name>>]
    jobs:
      - kona-update-monorepo:
          context:
            - circleci-repo-readonly-authenticated-github-token

  # Kona supervisor E2E tests (from supervisor_e2e_sysgo.yaml) - manual dispatch only
  kona-supervisor-e2e:
    when:
      and:
        - equal: [true, <<pipeline.parameters.kona_dispatch>>]
        - equal: ["api", << pipeline.trigger_source >>]
    jobs:
      - kona-supervisor-e2e-tests:
          name: kona-supervisor-<<matrix.test_pkg>>
          matrix:
            parameters:
              test_pkg: ["pre_interop", "l1reorg/sysgo"]
          context:
            - circleci-repo-readonly-authenticated-github-token

  # Kona publish prestate artifacts (from publish_artifacts.yaml) - on push to main or tags
  kona-publish-prestates:
    when:
      or:
        - equal: ["develop", <<pipeline.git.branch>>]
    jobs:
      - kona-publish-prestate-artifacts:
          name: kona-publish-<<matrix.version>>
          matrix:
            parameters:
              version: ["kona-client", "kona-client-int"]
          context:
            - circleci-repo-readonly-authenticated-github-token
            - oplabs-gcr
