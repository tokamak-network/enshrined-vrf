version: 2.1

# OP-Reth CI Continuation Configuration
# This file contains ONLY op-reth-specific jobs and workflows.
# It is merged with main.yml and rust-ci.yml when op-reth/** changes are detected.
# Shared orbs, commands, and jobs come from main.yml and rust-ci.yml during merge.

parameters:
  # Required parameters (also in main.yml, merged during continuation)
  default_docker_image:
    type: string
    default: cimg/base:2024.01
  base_image:
    type: string
    default: default
  op_reth_dispatch:
    type: boolean
    default: false
  go-cache-version:
    type: string
    default: "v0.0"

# ============================================================================
# OP-RETH JOBS (project-specific only; shared jobs are in rust-ci.yml)
# ============================================================================
# Note: Commands like rust-prepare, rust-restore-build-cache, rust-save-build-cache,
# rust-prepare-and-restore-cache, rust-install-toolchain, install-cargo-binstall,
# and notify-failures-on-develop are imported from main.yml
jobs:
  # OP-Reth compact codec backwards compatibility
  op-reth-compact-codec:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &op-reth-compact-cache
          directory: op-reth
          prefix: op-reth-compact
          profile: debug
      - run:
          name: Generate compact vectors from base
          working_directory: op-reth
          command: |
            # Use develop as the base branch
            BASE_BRANCH="develop"

            # Save current state
            git stash || true
            git fetch origin $BASE_BRANCH
            git checkout origin/$BASE_BRANCH

            # Generate vectors on base
            cargo run --bin op-reth --features "dev" --manifest-path bin/Cargo.toml -- test-vectors compact --write

            # Return to PR branch
            git checkout -
            git stash pop || true
      - run:
          name: Read compact vectors on PR branch
          working_directory: op-reth
          command: |
            cargo run --bin op-reth --features "dev" --manifest-path bin/Cargo.toml -- test-vectors compact --read
      - rust-save-build-cache: *op-reth-compact-cache

  # OP-Reth Windows cross-compile check
  op-reth-windows-check:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &op-reth-windows-cache
          directory: op-reth
          prefix: op-reth-windows
          profile: debug
      - rust-install-toolchain:
          target: x86_64-pc-windows-gnu
      - run:
          name: Install mingw-w64
          command: sudo apt-get update && sudo apt-get install -y mingw-w64
      - run:
          name: Check OP-Reth Windows build
          working_directory: op-reth
          no_output_timeout: 40m
          command: cargo check -p op-reth --target x86_64-pc-windows-gnu
      - rust-save-build-cache: *op-reth-windows-cache

# ============================================================================
# OP-RETH WORKFLOWS
# ============================================================================
workflows:
  # OP-Reth main CI workflow (runs on push/PR when op-reth/** changes)
  op-reth-ci:
    when:
      or:
        - equal: ["webhook", << pipeline.trigger_source >>]
        - and:
            - equal: [true, <<pipeline.parameters.op_reth_dispatch>>]
            - equal: ["api", << pipeline.trigger_source >>]
    jobs:
      # Lint jobs (shared)
      - rust-ci-clippy:
          name: op-reth-clippy
          directory: op-reth
          command: "cargo clippy --workspace --lib --examples --tests --benches --all-features --locked"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-fmt:
          name: op-reth-fmt
          directory: op-reth
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-typos:
          name: op-reth-typos
          directory: op-reth
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-deny:
          name: op-reth-deny
          directory: op-reth
          command: "cargo deny --all-features check all"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-zepter:
          name: op-reth-feature-propagation
          directory: op-reth
          command: |
            cargo metadata --format-version=1 --locked > /dev/null
            zepter run check
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Crate checks (parallelized, shared job)
      - rust-ci-cargo-hack:
          name: op-reth-crate-checks
          directory: op-reth
          flags: "--workspace"
          parallelism: 3
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Build checks
      - rust-build-binary:
          name: op-reth-msrv
          directory: op-reth
          binary: op-reth
          toolchain: "1.88.0"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - op-reth-windows-check:
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-build-binary:
          name: op-reth-build-release
          directory: op-reth
          profile: release
          binary: op-reth
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Test jobs (shared) - stable and edge storage variants
      - rust-ci-cargo-tests:
          name: op-reth-unit-tests-stable
          directory: op-reth
          cache_profile: debug
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-reth-unit-tests-edge
          directory: op-reth
          flags: "edge"
          cache_profile: debug
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-reth-integration-tests
          directory: op-reth
          command: test-integration
          cache_profile: debug
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-doctest:
          name: op-reth-doc-test
          directory: op-reth
          command: "cargo test --doc --workspace --all-features"
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Codec compatibility
      - op-reth-compact-codec:
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Udeps (slower, depends on other jobs)
      - rust-ci-udeps:
          name: op-reth-udeps
          directory: op-reth
          context:
            - circleci-repo-readonly-authenticated-github-token
          requires:
            - op-reth-clippy
