version: 2.1

# Op-Alloy CI Continuation Configuration
# This file contains ONLY Op-Alloy-specific jobs and workflows.
# It is merged with main.yml and rust-ci.yml when op-alloy/** changes are detected.
# Shared orbs, commands, and jobs come from main.yml and rust-ci.yml during merge.

parameters:
  default_docker_image:
    type: string
    default: cimg/base:2024.01
  op_alloy_dispatch:
    type: boolean
    default: false

# ============================================================================
# Op-Alloy Jobs (project-specific only; shared jobs are in rust-ci.yml)
# ============================================================================
jobs:
  # Op-Alloy Rust CI - Examples (from ci.yml)
  op-alloy-examples:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &op-alloy-examples-cache
          directory: op-alloy
          prefix: op-alloy-examples
      - rust-install-toolchain:
          channel: nightly
          toolchain_version: nightly
      - run:
          name: Build and run examples
          working_directory: op-alloy
          no_output_timeout: 40m
          command: |
            just examples
      - rust-save-build-cache: *op-alloy-examples-cache

  # Op-Alloy Rust CI - Cfg Check (from ci.yml)
  op-alloy-cfg-check:
    docker:
      - image: <<pipeline.parameters.default_docker_image>>
    resource_class: xlarge
    steps:
      - utils/checkout-with-mise:
          checkout-method: blobless
      - rust-prepare-and-restore-cache: &op-alloy-cfg-check-cache
          directory: op-alloy
          prefix: op-alloy-cfg-check
      - rust-install-toolchain:
          channel: nightly
          toolchain_version: nightly
      - run:
          name: Run cfg check
          working_directory: op-alloy
          no_output_timeout: 40m
          command: |
            just check
      - rust-save-build-cache: *op-alloy-cfg-check-cache

### END OP-ALLOY JOBS ###

# ============================================================================
# Op-Alloy Workflow (migrated from op-alloy/.github/workflows)
# ============================================================================
workflows:
  op-alloy:
    when:
      or:
        - equal: ["webhook", << pipeline.trigger_source >>]
        - and:
            - equal: [true, <<pipeline.parameters.op_alloy_dispatch>>]
            - equal: ["api", << pipeline.trigger_source >>]
    jobs:
      # Build (shared job from main.yml)
      - rust-build-binary:
          name: op-alloy-build
          directory: op-alloy
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Rust CI jobs (shared job)
      - rust-ci-cargo-tests:
          name: op-alloy-test-stable
          directory: op-alloy
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-test-stable-no-default
          directory: op-alloy
          flags: "--no-default-features"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-test-stable-all-features
          directory: op-alloy
          flags: "--all-features"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-test-nightly
          directory: op-alloy
          rust_version: "nightly"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-test-nightly-no-default
          directory: op-alloy
          rust_version: "nightly"
          flags: "--no-default-features"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-test-nightly-all-features
          directory: op-alloy
          rust_version: "nightly"
          flags: "--all-features"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-build-msrv
          directory: op-alloy
          rust_version: "1.88"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-tests:
          name: op-alloy-build-msrv-no-default
          directory: op-alloy
          rust_version: "1.88"
          flags: "--no-default-features"
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Doc tests (shared job)
      - rust-ci-doctest:
          name: op-alloy-cargo-doctest
          directory: op-alloy
          command: "just test-docs"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-hack-build:
          name: op-alloy-wasm-unknown
          directory: op-alloy
          target: wasm32-unknown-unknown
          flags: "--workspace --exclude op-alloy-network --exclude op-alloy-rpc-jsonrpsee --exclude op-alloy-provider"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-hack-build:
          name: op-alloy-wasm-wasi
          directory: op-alloy
          target: wasm32-wasip1
          flags: "--workspace --exclude op-alloy-network --exclude op-alloy-rpc-types --exclude op-alloy-provider --exclude op-alloy-rpc-jsonrpsee"
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-check-no-std:
          name: op-alloy-check-no-std
          directory: op-alloy
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-cargo-hack:
          name: op-alloy-feature-checks
          directory: op-alloy
          flags: "--feature-powerset --depth 1"
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Clippy (shared job)
      - rust-ci-clippy:
          name: op-alloy-clippy
          directory: op-alloy
          command: "just clippy"
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Documentation (shared job)
      - rust-ci-docs:
          name: op-alloy-docs
          directory: op-alloy
          command: "cargo doc --workspace --all-features --no-deps --document-private-items"
          rustdocflags: "--cfg docsrs -D warnings --show-type-layout --generate-link-to-definition --enable-index-page -Zunstable-options"
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Formatting (shared job)
      - rust-ci-fmt:
          name: op-alloy-fmt
          directory: op-alloy
          command: "just fmt-check"
          context:
            - circleci-repo-readonly-authenticated-github-token

      - op-alloy-examples:
          context:
            - circleci-repo-readonly-authenticated-github-token
      - op-alloy-cfg-check:
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Lint jobs (shared)
      - rust-ci-typos:
          name: op-alloy-typos
          directory: op-alloy
          context:
            - circleci-repo-readonly-authenticated-github-token
      - rust-ci-zepter:
          name: op-alloy-zepter
          directory: op-alloy
          command: "time zepter run check"
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Deps jobs (shared)
      - rust-ci-deny:
          name: op-alloy-cargo-deny
          directory: op-alloy
          context:
            - circleci-repo-readonly-authenticated-github-token

      # Feature powerset (from ci.yml) - runs after initial checks
      - rust-ci-cargo-hack:
          name: op-alloy-cargo-hack
          directory: op-alloy
          flags: "--feature-powerset --no-dev-deps --workspace"
          parallelism: 4
          context:
            - circleci-repo-readonly-authenticated-github-token
          requires:
            - op-alloy-test-stable
            - op-alloy-clippy
            - op-alloy-fmt
