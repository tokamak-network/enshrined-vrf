name: 'Docker Build Prep'
description: 'Prepare environment for docker builds (checkout, git versions)'

outputs:
  versions:
    description: 'JSON object mapping image names to their GIT_VERSION'
    value: ${{ steps.compute_versions.outputs.versions }}
  date:
    description: 'Current date in YYYYMMDD format'
    value: ${{ steps.date.outputs.date }}

runs:
  using: 'composite'
  steps:
    - name: Install mise
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install_args: just

    - name: Get date
      id: date
      shell: bash
      run: |
        DATE=$(date +%Y%m%d)
        echo "date=$DATE" >> $GITHUB_OUTPUT

    - name: Compute GIT_VERSION for all images
      id: compute_versions
      shell: bash
      run: |
        VERSIONS=$(GIT_COMMIT="${{ github.sha }}" just compute-git-versions)
        echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
        echo "Computed versions: $VERSIONS"

